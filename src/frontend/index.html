<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biccas - Increase your Productivity</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="nav-container">
                <div class="logo">
                    <span class="logo-text">Biccas</span>
                </div>
                <nav class="nav-menu">
                    <a href="#" class="nav-link active">Home</a>
                    <a href="#" class="nav-link">Product</a>
                    <a href="#" class="nav-link">FAQ</a>
                    <a href="#" class="nav-link">Blog</a>
                    <a href="#" class="nav-link">About Us</a>
                </nav>
                <div class="nav-actions">
                    <a href="#" class="btn-login">Login</a>
                    <a href="#" class="btn-signup">Sign Up</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="hero-left">
                    <h1 class="hero-title">
                        We're here to <br>Increase your 
                        <span class="highlight-container">
                            Productivity
                            <img src="images/Vector2.png" alt="Curved line" class="curved-line">
                        </span>
                    </h1>
                    <p class="hero-description">
                        Let's make your work more organize and easily using the Taskio Dashboard with many of the latest features in managing work every day.
                    </p>
                    <div class="hero-actions">
                        <a href="#" class="btn-primary">Try free trial</a>
                        <a href="#" class="btn-secondary">
                            <span class="play-icon">▶</span>
                            View Demo
                        </a>
                    </div>
                </div>
                <div class="hero-right">
                    <div class="hero-illustration">
                        <img src="images/card.png" alt="Dashboard illustration" class="main-illustration">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Company Logos Section -->
    <section class="company-logos">
        <div class="container">
            <h2 class="logos-title">More than 25,000 teams use Collabs</h2>
            <div class="logos-grid">
                <div class="logo-item">
                    <img src="images/Logos.png" alt="Unsplash" class="company-logo">
                </div>
                <div class="logo-item">
                    <img src="images/Logos.png" alt="Notion" class="company-logo">
                </div>
                <div class="logo-item">
                    <img src="images/Logos.png" alt="INTERCOM" class="company-logo">
                </div>
                <div class="logo-item">
                    <img src="images/Logos.png" alt="descript" class="company-logo">
                </div>
                <div class="logo-item">
                    <img src="images/Logos.png" alt="grammarly" class="company-logo">
                </div>
            </div>
        </div>
    </section>
</body>
</html>
